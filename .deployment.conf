#############################################################################
# Конфигурационный файл для развёртывания Ceph кластера
# Astra Linux 1.7 + OpenNebula + Prometheus + Grafana
#
# Использование: source .deployment.conf или передать deploy.sh deploy.sh all deployment.conf
#############################################################################

# === ИНФОРМАЦИЯ О КЛАСТЕРЕ ===
CLUSTER_NAME="ceph"
CLUSTER_VERSION="octopus"  # octopus, pacific, quincy

# === УЗЛЫ КЛАСТЕРА ===
# Monitor/Admin узел (где запускаются скрипты развёртывания)
MONITOR_NODE="astra-monitor1"
MONITOR_IP="192.168.1.100"

# Узлы хранения (Compute nodes с OSD дисками)
COMPUTE_NODES=("astra-node1" "astra-node2" "astra-node3")
COMPUTE_IPS=("192.168.1.101" "192.168.1.102" "192.168.1.103")

# === СЕТЕВАЯ КОНФИГУРАЦИЯ ===
# Сеть для клиентов (OpenNebula VMs, приложений и т.д.)
PUBLIC_NETWORK="192.168.1.0/24"
PUBLIC_GATEWAY="192.168.1.1"

# Сеть для межсерверного трафика Ceph (рекомендуется отдельная сеть)
CLUSTER_NETWORK="192.168.2.0/24"
CLUSTER_GATEWAY="192.168.2.1"

# === КОНФИГУРАЦИЯ ХРАНИЛИЩА ===
# Устройства для OSD дисков (index соответствует COMPUTE_NODES)
OSD_DEVICES=("/dev/sdb" "/dev/sdc" "/dev/sdd")

# Тип хранилища: bluestore или filestore (bluestore рекомендуется)
OSD_OBJECTSTORE="bluestore"

# Размер журнала OSD (в MB)
OSD_JOURNAL_SIZE=10240

# === ПАРАМЕТРЫ ПРОИЗВОДИТЕЛЬНОСТИ ===
# Количество PG (Placement Groups) на OSD
OSD_PG_NUM=128

# Макс PG на OSD
OSD_MAX_PG_PER_OSD=200

# === ПАРАМЕТРЫ REPLIKАЦИИ ===
# Количество копий данных (pool default size)
POOL_DEFAULT_SIZE=3

# Минимум копий для операции (pool min size)
POOL_DEFAULT_MIN_SIZE=2

# === КОНФИГУРАЦИЯ OPENNEBULA ===
ENABLE_OPENNEBULA=true

# Путь к .deb файлам OpenNebula
DEB_PATH="./deb"

# Пароль администратора (будет перегенерирован, оставить пусто)
OPENNEBULA_ADMIN_PASSWORD=""

# === КОНФИГУРАЦИЯ МОНИТОРИНГА ===
# Включение Prometheus
ENABLE_PROMETHEUS=true

# Включение Grafana
ENABLE_GRAFANA=true

# Включение Node Exporter на всех узлах
ENABLE_NODE_EXPORTER=true

# Период скрейпинга Prometheus (в секундах)
PROMETHEUS_SCRAPE_INTERVAL=15
PROMETHEUS_EVALUATION_INTERVAL=15

# Retention период для Prometheus (дни)
PROMETHEUS_RETENTION_DAYS=30

# === ПАРАМЕТРЫ БЕЗОПАСНОСТИ ===
# Уровень защиты: eagle, standard
SECURITY_LEVEL="eagle"

# Включение SSL/TLS (требует сертификатов)
ENABLE_SSL=true

# Включение шифрования диска DM-Crypt (замедляет, но безопаснее)
ENABLE_DMCRYPT=false

# === ПАРАМЕТРЫ ДЕПЛОЙМЕНТА ===
# Пропустить подготовку окружения (если уже сделана)
SKIP_PREREQUISITES=false

# Пропустить подготовку узлов
SKIP_NODE_PREPARE=false

# Использовать SSH для удалённых узлов
USE_SSH_FOR_REMOTE=true

# SSH пользователь
SSH_USER="root"

# === ПАРАМЕТРЫ ЛОГА ===
# Уровень детализации логирования: error, warn, info, debug
LOG_LEVEL="info"

# Путь к файлу логирования
LOG_FILE="/var/log/ceph_deployment.log"

# === ПАРАМЕТРЫ ВОССТАНОВЛЕНИЯ ===
# Максимум одновременных backfills
OSD_MAX_BACKFILLS=1

# Макс активных операций восстановления
OSD_RECOVERY_MAX_ACTIVE=3

# === ПАРАМЕТРЫ RGWA (Object Storage) ===
# Включение RGW (RADOS Gateway)
ENABLE_RGW=true

# RGW порт
RGW_PORT=7480

# === ПАРАМЕТРЫ CEPHFS ===
# Включение CephFS
ENABLE_CEPHFS=false

# === ПАРАМЕТРЫ КОНТАКТОВ ОПОВЕЩЕНИЯ ===
# Email для оповещений (если настроен Alertmanager)
ALERT_EMAIL="admin@example.com"

# === ПАРАМЕТРЫ РЕЗЕРВНОГО КОПИРОВАНИЯ ===
# Включение автоматического резервного копирования конфигурации
ENABLE_CONFIG_BACKUP=true

# Директория для резервных копий
BACKUP_DIR="/var/backups/ceph-config"
