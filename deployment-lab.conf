#!/bin/bash
#############################################################################
# ПРИМЕР: Конфигурация для развёртывания на лабораторной установке
# Копируйте и адаптируйте для вашей среды
#
# Использование: sudo ./scripts/deploy.sh all deployment-lab.conf
#############################################################################

# === ЛАБОРАТОРНАЯ УСТАНОВКА (Demo/PoC) ===
# Для небольших тестов и демонстраций

# ИНФОРМАЦИЯ О КЛАСТЕРЕ
CLUSTER_NAME="ceph-lab"
CLUSTER_VERSION="octopus"

# УЗЛЫ КЛАСТЕРА
MONITOR_NODE="astra-monitor1"
MONITOR_IP="192.168.1.100"

COMPUTE_NODES=("astra-node1" "astra-node2" "astra-node3")
COMPUTE_IPS=("192.168.1.101" "192.168.1.102" "192.168.1.103")

# СЕТЕВАЯ КОНФИГУРАЦИЯ
# Для лабораторной установки используется одна сеть
PUBLIC_NETWORK="192.168.1.0/24"
PUBLIC_GATEWAY="192.168.1.1"

# КЛАСТЕР сеть (если доступна отдельная сеть)
CLUSTER_NETWORK="192.168.1.0/24"
CLUSTER_GATEWAY="192.168.1.1"

# ХРАНИЛИЩЕ
# Для VirtualBox/KVM используйте виртуальные диски
OSD_DEVICES=("/dev/sdb" "/dev/sdc" "/dev/sdd")
OSD_OBJECTSTORE="bluestore"
OSD_JOURNAL_SIZE=1024  # Меньше для лабораторной установки

# ПАРАМЕТРЫ ПРОИЗВОДИТЕЛЬНОСТИ (оптимизировано для лабораторной установки)
OSD_PG_NUM=32          # Меньше PG для экономии памяти
OSD_MAX_PG_PER_OSD=100

# ПАРАМЕТРЫ РЕПЛИКАЦИИ
POOL_DEFAULT_SIZE=2    # 2 копии вместо 3 для экономии места
POOL_DEFAULT_MIN_SIZE=1

# OPENNEBULA
ENABLE_OPENNEBULA=true
DEB_PATH="./deb"

# МОНИТОРИНГ
ENABLE_PROMETHEUS=true
ENABLE_GRAFANA=true
ENABLE_NODE_EXPORTER=true

PROMETHEUS_SCRAPE_INTERVAL=30
PROMETHEUS_EVALUATION_INTERVAL=30
PROMETHEUS_RETENTION_DAYS=7  # Меньше дней для экономии дискового пространства

# БЕЗОПАСНОСТЬ
SECURITY_LEVEL="eagle"
ENABLE_SSL=true
ENABLE_DMCRYPT=false  # Отключено для лабораторной установки

# РАЗВЁРТЫВАНИЕ
SKIP_PREREQUISITES=false
SKIP_NODE_PREPARE=false
USE_SSH_FOR_REMOTE=true
SSH_USER="astraadm"

# ЛОГИРОВАНИЕ
LOG_LEVEL="info"
LOG_FILE="/var/log/ceph_deployment.log"

# ВОССТАНОВЛЕНИЕ
OSD_MAX_BACKFILLS=2
OSD_RECOVERY_MAX_ACTIVE=5

# OBJECT STORAGE (RGW)
ENABLE_RGW=true
RGW_PORT=7480

# CEPHFS
ENABLE_CEPHFS=false

# ОПОВЕЩЕНИЯ
ALERT_EMAIL="admin@lab.local"

# РЕЗЕРВНОЕ КОПИРОВАНИЕ
ENABLE_CONFIG_BACKUP=true
BACKUP_DIR="/var/backups/ceph-config"

echo "Конфигурация лабораторной установки загружена"
echo "Узлы: $MONITOR_NODE, ${COMPUTE_NODES[@]}"
echo "Диски: ${OSD_DEVICES[@]}"
