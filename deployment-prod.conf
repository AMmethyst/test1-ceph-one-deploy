#!/bin/bash
#############################################################################
# ПРИМЕР: Конфигурация для production окружения
# ВНИМАНИЕ: Адаптируйте параметры под вашу инфраструктуру!
#
# Использование: sudo ./scripts/deploy.sh all deployment-prod.conf
#############################################################################

# === PRODUCTION УСТАНОВКА ===
# Для высоконагруженных production сред

# ИНФОРМАЦИЯ О КЛАСТЕРЕ
CLUSTER_NAME="ceph-prod"
CLUSTER_VERSION="quincy"  # или более новая stable версия

# УЗЛЫ КЛАСТЕРА (минимум 3 monitor, 6 OSD)
MONITOR_NODE="mon1.ceph.prod"
MONITOR_IP="10.0.1.10"

COMPUTE_NODES=("osd1.ceph.prod" "osd2.ceph.prod" "osd3.ceph.prod" "osd4.ceph.prod" "osd5.ceph.prod" "osd6.ceph.prod")
COMPUTE_IPS=("10.0.2.101" "10.0.2.102" "10.0.2.103" "10.0.2.104" "10.0.2.105" "10.0.2.106")

# СЕТЕВАЯ КОНФИГУРАЦИЯ (отдельные сети)
# Client network (внешние клиенты)
PUBLIC_NETWORK="10.0.1.0/24"
PUBLIC_GATEWAY="10.0.1.1"

# Cluster network (OSD-OSD синхронизация, быстрая и безопасная)
CLUSTER_NETWORK="10.0.2.0/24"
CLUSTER_GATEWAY="10.0.2.1"

# ХРАНИЛИЩЕ (NVMe + SSD рекомендуется)
OSD_DEVICES=("/dev/nvme0n1" "/dev/nvme1n1" "/dev/sda" "/dev/sdb")
OSD_OBJECTSTORE="bluestore"
OSD_JOURNAL_SIZE=10240  # 10 GB журнала на быстрые диски

# ПАРАМЕТРЫ ПРОИЗВОДИТЕЛЬНОСТИ (оптимизировано для production)
OSD_PG_NUM=512          # Больше PG для лучшей балансировки
OSD_MAX_PG_PER_OSD=250

# ПАРАМЕТРЫ РЕПЛИКАЦИИ
POOL_DEFAULT_SIZE=3     # 3 копии для надёжности
POOL_DEFAULT_MIN_SIZE=2

# OPENNEBULA
ENABLE_OPENNEBULA=true
DEB_PATH="/opt/packages/deb"
OPENNEBULA_ADMIN_PASSWORD=""  # Будет сгенерирован

# МОНИТОРИНГ (с длительным хранением)
ENABLE_PROMETHEUS=true
ENABLE_GRAFANA=true
ENABLE_NODE_EXPORTER=true

PROMETHEUS_SCRAPE_INTERVAL=15
PROMETHEUS_EVALUATION_INTERVAL=15
PROMETHEUS_RETENTION_DAYS=90  # 3 месяца хранения метрик

# БЕЗОПАСНОСТЬ (максимум для "Орла")
SECURITY_LEVEL="eagle"
ENABLE_SSL=true
ENABLE_DMCRYPT=true  # Шифрование диска для чувствительных данных

# РАЗВЁРТЫВАНИЕ
SKIP_PREREQUISITES=false
SKIP_NODE_PREPARE=false
USE_SSH_FOR_REMOTE=true
SSH_USER="ceph-deploy"

# ЛОГИРОВАНИЕ
LOG_LEVEL="info"
LOG_FILE="/var/log/ceph_deployment.log"

# ВОССТАНОВЛЕНИЕ (консервативные параметры)
OSD_MAX_BACKFILLS=1
OSD_RECOVERY_MAX_ACTIVE=3

# OBJECT STORAGE (RGW) для архивирования
ENABLE_RGW=true
RGW_PORT=7480

# CEPHFS (если требуется)
ENABLE_CEPHFS=false

# ОПОВЕЩЕНИЯ
ALERT_EMAIL="ceph-ops@company.com"

# РЕЗЕРВНОЕ КОПИРОВАНИЕ (обязательно!)
ENABLE_CONFIG_BACKUP=true
BACKUP_DIR="/backup/ceph-config"

# ПАРАМЕТРЫ PERFORMANCE TUNING
# Эти параметры будут добавлены в ceph.conf
OSD_CRUSH_INITIAL_WEIGHT="auto"
OSD_POOL_DEFAULT_CRUSH_REPLICATE_RULE="default"

# Параметры сети (если требуется оптимизация)
MS_BIND_PORT_MIN=6789
MS_BIND_PORT_MAX=7300

# Параметры кэша (если есть SSD для журнала)
RBD_CACHE="true"
RBD_CACHE_SIZE="335544320"  # 320 MB на VM

echo "Production конфигурация загружена"
echo "Кластер: $CLUSTER_NAME"
echo "Monitor: $MONITOR_NODE ($MONITOR_IP)"
echo "OSD узлы: ${#COMPUTE_NODES[@]} узлов"
echo "Безопасность: $SECURITY_LEVEL"
